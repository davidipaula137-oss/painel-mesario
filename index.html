<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Oficial do Mesário - Karatê</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #222; padding: 15px; text-align: center; border-bottom: 5px solid #ffd700; }
        .arena { display: flex; width: 98%; justify-content: space-around; margin-top: 20px; gap: 15px; }
        
        /* Containers Atletas */
        .atleta-box { width: 48%; border-radius: 20px; padding: 25px; text-align: center; }
        .aka { background: linear-gradient(145deg, #d32f2f, #b71c1c); border: 6px solid #7f0000; }
        .ao { background: linear-gradient(145deg, #1976d2, #0d47a1); border: 6px solid #002171; }
        
        .nome { font-size: 2.2em; font-weight: bold; margin-bottom: 10px; height: 60px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .pontos { font-size: 8em; font-weight: bold; margin: 10px 0; }
        
        /* Botões */
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        button:active { transform: scale(0.9); }
        
        .btn-ponto { padding: 15px; font-size: 1.2em; background: #fff; color: #333; width: 32%; margin: 2px; }
        
        .faltas-container { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-top: 20px; }
        .faltas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        
        .btn-falta { padding: 12px 5px; font-size: 0.8em; color: white; background: #444; border: 1px solid #666; }
        .btn-falta.on { background: #ffd700 !important; color: #000 !important; box-shadow: 0 0 15px #ffd700; border-color: #fff; }
        
        .btn-shikaku { background: #000; color: #ff4444; grid-column: span 3; border: 1px solid red; margin-top: 5px; }

        /* Timer */
        .timer-sec { margin: 15px; background: #333; padding: 15px 40px; border-radius: 50px; border: 4px solid #ffd700; text-align: center; }
        .clock-display { font-size: 4em; font-weight: bold; font-family: monospace; color: #ffd700; }
        .timer-controls button { background: #ffd700; color: #000; padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>GESTOR DE COMBATE</h1>
    <div class="timer-sec">
        <div class="clock-display" id="clock">01:30</div>
        <div class="timer-controls">
            <button onclick="startTimer()">INICIAR</button>
            <button onclick="stopTimer()" style="background:#ff4444; color:white;">PARAR</button>
            <button onclick="resetTimer()" style="background:#fff;">RESET</button>
        </div>
    </div>
</div>

<div class="arena">
    <div class="atleta-box aka">
        <div class="nome" id="nome-aka">AKA: ATLETA 1</div>
        <div class="pontos" id="ponto-aka">0</div>
        
        <button class="btn-ponto" onclick="addPonto('aka', 1)">+1 YUKO</button>
        <button class="btn-ponto" onclick="addPonto('aka', 2)">+2 WAZA</button>
        <button class="btn-ponto" onclick="addPonto('aka', 3)">+3 IPPON</button>

        <div class="faltas-container">
            <div class="faltas-grid">
                <button id="aka-k" class="btn-falta" onclick="toggleFalta('aka-k')">KEIKOKU</button>
                <button id="aka-hs" class="btn-falta" onclick="toggleFalta('aka-hs')">H-SUI</button>
                <button id="aka-h" class="btn-falta" onclick="toggleFalta('aka-h')">HANSOKU</button>
                <button id="aka-m" class="btn-falta" onclick="toggleFalta('aka-m')">MUBOBI</button>
                <button id="aka-s" class="btn-falta btn-shikaku" onclick="toggleFalta('aka-s')">SHIKAKU</button>
            </div>
        </div>
    </div>

    <div class="atleta-box ao">
        <div class="nome" id="nome-ao">AO: ATLETA 2</div>
        <div class="pontos" id="ponto-ao">0</div>
        
        <button class="btn-ponto" onclick="addPonto('ao', 1)">+1 YUKO</button>
        <button class="btn-ponto" onclick="addPonto('ao', 2)">+2 WAZA</button>
        <button class="btn-ponto" onclick="addPonto('ao', 3)">+3 IPPON</button>

        <div class="faltas-container">
            <div class="faltas-grid">
                <button id="ao-k" class="btn-falta" onclick="toggleFalta('ao-k')">KEIKOKU</button>
                <button id="ao-hs" class="btn-falta" onclick="toggleFalta('ao-hs')">H-SUI</button>
                <button id="ao-h" class="btn-falta" onclick="toggleFalta('ao-h')">HANSOKU</button>
                <button id="ao-m" class="btn-falta" onclick="toggleFalta('ao-m')">MUBOBI</button>
                <button id="ao-s" class="btn-falta btn-shikaku" onclick="toggleFalta('ao-s')">SHIKAKU</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. LÓGICA DE PONTUAÇÃO
    function addPonto(atleta, valor) {
        const el = document.getElementById('ponto-' + atleta);
        el.innerText = parseInt(el.innerText) + valor;
    }

    // 2. LÓGICA DE FALTAS (LIGA/DESLIGA)
    function toggleFalta(id) {
        const btn = document.getElementById(id);
        btn.classList.toggle('on');
    }

    // 3. LÓGICA DO CRONÔMETRO
    let tempoRestante = 180; // 3 minutos
    let interval = null;

    function atualizarDisplay() {
        const min = Math.floor(tempoRestante / 60);
        const seg = tempoRestante % 60;
        document.getElementById('clock').innerText = 
            `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (interval) return;
        interval = setInterval(() => {
            if (tempoRestante > 0) {
                tempoRestante--;
                atualizarDisplay();
            } else {
                stopTimer();
                alert("TEMPO ENCERRADO!");
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(interval);
        interval = null;
    }

    function resetTimer() {
        stopTimer();
        tempoRestante = 180;
        atualizarDisplay();
    }

    // Carregar nomes da URL (Integração com Sheets)
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        if(params.get('aka')) document.getElementById('nome-aka').innerText = "AKA: " + params.get('aka');
        if(params.get('ao')) document.getElementById('nome-ao').innerText = "AO: " + params.get('ao');
        atualizarDisplay();
    }
</script>

</body>
</html>
