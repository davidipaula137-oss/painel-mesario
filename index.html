<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Karatê - Edição Campeão</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { width: 100%; background: #222; padding: 10px; text-align: center; border-bottom: 5px solid #ffd700; }
        .arena { display: flex; width: 98%; justify-content: space-around; margin-top: 10px; gap: 15px; }
        
        /* Containers Atletas */
        .atleta-box { width: 48%; border-radius: 20px; padding: 20px; text-align: center; transition: 0.3s; }
        .aka { background: linear-gradient(145deg, #d32f2f, #b71c1c); border: 6px solid #7f0000; }
        .ao { background: linear-gradient(145deg, #1976d2, #0d47a1); border: 6px solid #002171; }
        
        .nome { font-size: 2em; font-weight: bold; height: 50px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .pontos { font-size: 7em; font-weight: bold; margin: 5px 0; }
        
        /* Botões */
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.1s; }
        button:active { transform: scale(0.9); }
        .btn-ponto { padding: 12px; font-size: 1.1em; background: #fff; color: #333; width: 32%; margin: 2px; }
        
        .btn-falta { padding: 10px 5px; font-size: 0.7em; color: white; background: #444; border: 1px solid #666; width: 100%; }
        .btn-falta.on { background: #ffd700 !important; color: #000 !important; box-shadow: 0 0 10px #ffd700; }
        
        /* Timer */
        .timer-sec { background: #333; padding: 10px 30px; border-radius: 50px; border: 4px solid #ffd700; display: inline-block; margin: 5px; }
        .clock-display { font-size: 3.5em; font-weight: bold; font-family: monospace; color: #ffd700; }
        
        /* Overlay do Campeão (O "Pulo" na tela) */
        #overlay-campeao {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: zoomIn 0.5s ease-out;
        }

        @keyframes zoomIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .card-campeao {
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            border: 10px solid #ffd700;
            box-shadow: 0 0 50px #ffd700;
        }

        .btn-vitoria { background: #ffd700; color: #000; padding: 10px; width: 100%; margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>

<div id="overlay-campeao">
    <div class="card-campeao" id="card-cor">
        <h1 style="font-size: 3em; margin: 0;">🏆 VENCEDOR 🏆</h1>
        <div id="vencedor-nome" style="font-size: 4em; font-weight: bold; margin: 20px 0;">NOME DO ATLETA</div>
        <button onclick="fecharCampeao()" style="padding: 15px 40px; font-size: 1.5em; background: white; color: black;">FECHAR</button>
    </div>
</div>

<div class="header">
    <div class="timer-sec">
        <div class="clock-display" id="clock">01:30</div>
        <button onclick="startTimer()" style="background:#ffd700; padding: 8px 15px;">INICIAR</button>
        <button onclick="stopTimer()" style="background:#ff4444; color:white; padding: 8px 15px;">PARAR</button>
        <button onclick="resetTimer()" style="background:#fff; padding: 8px 15px;">RESET</button>
    </div>
</div>

<div class="arena">
    <div class="atleta-box aka" id="box-aka">
        <div class="nome" id="nome-aka">AKA: ATLETA 1</div>
        <div class="pontos" id="ponto-aka">0</div>
        <button class="btn-ponto" onclick="addPonto('aka', 1)">+1 YUKO</button>
        <button class="btn-ponto" onclick="addPonto('aka', 2)">+2 WAZA</button>
        <button class="btn-ponto" onclick="addPonto('aka', 3)">+3 IPPON</button>
        <button class="btn-vitoria" onclick="saltarCampeao('aka')">GANHOU (HANTEI)</button>
        <div class="faltas-grid" style="display:grid; grid-template-columns: repeat(2,1fr); gap:5px; margin-top:10px;">
            <button id="aka-k" class="btn-falta" onclick="toggle('aka-k')">KEIKOKU</button>
            <button id="aka-hs" class="btn-falta" onclick="toggle('aka-hs')">H-SUI</button>
            <button id="aka-h" class="btn-falta" onclick="toggle('aka-h')">HANSOKU</button>
            <button id="aka-m" class="btn-falta" onclick="toggle('aka-m')">MUBOBI</button>
        </div>
    </div>

    <div class="atleta-box ao" id="box-ao">
        <div class="nome" id="nome-ao">AO: AT
