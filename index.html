<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Karatê - Gestão de Koto</title>
    <style>
        :root { --aka: #d32f2f; --ao: #1976d2; --gold: #ffd700; --bg-dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--bg-dark); padding: 10px; border-bottom: 4px solid var(--gold); text-align: center; }
        #clock { font-size: 5.5em; font-family: 'Courier New', Courier, monospace; color: var(--gold); font-weight: bold; line-height: 1; margin-bottom: 10px; }
        
        .timer-ctrl button { padding: 10px 25px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin: 0 5px; font-size: 1.1em; }
        .btn-start { background: #4caf50; color: white; }
        .btn-pause { background: #f44336; color: white; }
        .btn-encho { background: #ff9800; color: white; }

        .arena { display: flex; flex: 1; gap: 10px; padding: 10px; }
        .box { flex: 1; border-radius: 20px; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; text-align: center; }
        .aka { background: linear-gradient(180deg, #b71c1c, #7f0000); border: 4px solid #5f0000; }
        .ao { background: linear-gradient(180deg, #0d47a1, #002171); border: 4px solid #00164b; }

        .nome { font-size: 2.5em; font-weight: 900; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .placar { font-size: 10em; font-weight: bold; line-height: 1; margin: 0; }
        
        .btn-pts { padding: 15px; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; background: #fff; color: #000; margin: 2px; }
        
        .faltas-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; }
        .btn-falta { background: #333; color: #aaa; border: 1px solid #555; padding: 8px 2px; font-size: 0.7em; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-falta.active { background: var(--gold) !important; color: #000 !important; box-shadow: 0 0 10px var(--gold); }
        .shikaku-btn { background: #000 !important; color: #f00 !important; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .venc-card { padding: 60px; border: 10px solid var(--gold); border-radius: 40px; text-align: center; }
        .dq-label { background: #f44336; color: white; padding: 5px 15px; border-radius: 5px; font-size: 0.4em; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="venc-overlay" class="overlay">
    <div id="venc-box" class="venc-card">
        <div id="dq-msg" class="dq-label" style="display:none;">DESCLASSIFICAÇÃO (HANSOKU/SHIKAKU)</div>
        <h1 style="font-size: 3em; margin: 0;">🏆 VENCEDOR 🏆</h1>
        <div id="venc-nome" style="font-size: 5em; font-weight: 900; margin: 30px 0;">NOME</div>
        <button onclick="window.close()" style="...">FECHAR E VOLTAR ÀS CHAVES</button>
    </div>
</div>

<div class="header">
    <div id="clock">01:30</div>
    <div class="timer-ctrl">
        <button class="btn-start" onclick="start()">INICIAR</button>
        <button class="btn-pause" onclick="pause()">PAUSAR</button>
        <button class="btn-encho" onclick="resetTimer(60)">ENCHO-SEN (1:00)</button>
    </div>
</div>

<div class="arena">
    <div class="box aka">
        <div class="nome" id="n-aka">AKA</div>
        <div class="placar" id="p-aka">0</div>
        <div style="display:flex">
            <button class="btn-pts" onclick="add('aka',1)">YUKO</button>
            <button class="btn-pts" onclick="add('aka',2)">WAZA</button>
            <button class="btn-pts" onclick="add('aka',3)">IPPON</button>
        </div>
        <div class="faltas-container">
            <button class="btn-falta" onclick="toggleF(this)">KEIKOKU</button>
            <button class="btn-falta" onclick="toggleF(this)">H-SUI</button>
            <button class="btn-falta" onclick="desclassificar('aka','HANSOKU')">HANSOKU</button>
            <button class="btn-falta" onclick="toggleF(this)">MUBOBI</button>
            <button class="btn-falta" onclick="toggleF(this)">HSANSOKU</button>
            <button class="btn-falta shikaku-btn" onclick="desclassificar('aka','SHIKAKU')">SHIKAKU</button>
        </div>
        <button id="win-aka-hantei" class="btn-start" style="display:none; margin-top:10px" onclick="win('aka')">VENCEDOR HANTEI</button>
    </div>

    <div class="box ao">
        <div class="nome" id="n-ao">AO</div>
        <div class="placar" id="p-ao">0</div>
        <div style="display:flex">
            <button class="btn-pts" onclick="add('ao',1)">YUKO</button>
            <button class="btn-pts" onclick="add('ao',2)">WAZA</button>
            <button class="btn-pts" onclick="add('ao',3)">IPPON</button>
        </div>
        <div class="faltas-container">
            <button class="btn-falta" onclick="toggleF(this)">KEIKOKU</button>
            <button class="btn-falta" onclick="toggleF(this)">H-SUI</button>
            <button class="btn-falta" onclick="desclassificar('ao','HANSOKU')">HANSOKU</button>
            <button class="btn-falta" onclick="toggleF(this)">MUBOBI</button>
            <button class="btn-falta" onclick="toggleF(this)">HSANSOKU</button>
            <button class="btn-falta shikaku-btn" onclick="desclassificar('ao','SHIKAKU')">SHIKAKU</button>
        </div>
        <button id="win-ao-hantei" class="btn-start" style="display:none; margin-top:10px" onclick="win('ao')">VENCEDOR HANTEI</button>
    </div>
</div>

<script>
    let time = 90;
    let timer = null;
    const params = new URLSearchParams(window.location.search);

    window.onload = () => {
    // Captura os dados da URL
    let akaFull = params.get('aka') || 'AKA';
    let aoFull = params.get('ao') || 'AO';

    // Exibe o nome completo (incluindo o que estiver nos parênteses vindo da planilha)
    document.getElementById('n-aka').innerText = akaFull;
    document.getElementById('n-ao').innerText = aoFull;
    
    updateDisplay();
}

    function updateDisplay() {
        let m = Math.floor(time / 60);
        let s = time % 60;
        document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function start() {
        if (timer) return;
        timer = setInterval(() => {
            if (time > 0) { time--; updateDisplay(); } 
            else { pause(); finalizarLuta(); }
        }, 1000);
    }

    function pause() { clearInterval(timer); timer = null; }

    function resetTimer(sec) {
        pause(); time = sec; updateDisplay();
        document.getElementById('win-aka-hantei').style.display = 'none';
        document.getElementById('win-ao-hantei').style.display = 'none';
    }

    function finalizarLuta() {
        let pAka = parseInt(document.getElementById('p-aka').innerText);
        let pAo = parseInt(document.getElementById('p-ao').innerText);
        if (pAka !== pAo) {
            win(pAka > pAo ? 'aka' : 'ao');
        } else {
            document.getElementById('win-aka-hantei').style.display = 'block';
            document.getElementById('win-ao-hantei').style.display = 'block';
        }
    }

    function desclassificar(atletaInfrator, tipo) {
        pause();
        const vencedor = (atletaInfrator === 'aka') ? 'ao' : 'aka';
        document.getElementById('dq-msg').style.display = 'block';
        document.getElementById('dq-msg').innerText = `DESCLASSIFICAÇÃO POR ${tipo}`;
        win(vencedor);
    }

    function add(atleta, pts) {
        let el = document.getElementById('p-' + atleta);
        el.innerText = parseInt(el.innerText) + pts;
    }

    function toggleF(btn) { btn.classList.toggle('active'); }

    function win(cor) {
        let nome = document.getElementById('n-' + cor).innerText;
        document.getElementById('venc-nome').innerText = nome;
        document.getElementById('venc-box').style.background = cor === 'aka' ? 'var(--aka)' : 'var(--ao)';
        document.getElementById('venc-overlay').style.display = 'flex';
    }
</script>
</body>
</html>
